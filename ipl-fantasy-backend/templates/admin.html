<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy — Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #f0f0f8; font-family: system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding: 20px; }
  h1 { color: #f97316; font-size: 24px; margin-bottom: 4px; }
  p { color: #6b6b8a; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: #6b6b8a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  input, select { width: 100%; background: #12121a; border: 1px solid #2a2a3d; color: #f0f0f8; padding: 12px 14px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; outline: none; }
  input:focus, select:focus { border-color: #f97316; }
  .btn { width: 100%; background: #f97316; color: #000; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result { background: #12121a; border: 1px solid #2a2a3d; border-radius: 10px; padding: 16px; margin-top: 20px; display: none; }
  .result.success { border-color: #22c55e; }
  .result.error { border-color: #ef4444; }
  .result h3 { margin-bottom: 10px; }
  .player-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a26; font-size: 13px; }
  .player-row:last-child { border-bottom: none; }
  .pts-pos { color: #22c55e; }
  .pts-neg { color: #ef4444; }
  .upload-area { border: 2px dashed #2a2a3d; border-radius: 10px; padding: 30px; text-align: center; margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s; }
  .upload-area:hover, .upload-area.dragover { border-color: #f97316; }
  .upload-area p { color: #6b6b8a; margin: 0; font-size: 13px; }
  .preview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
  .spinner { display: none; text-align: center; padding: 20px; color: #6b6b8a; }
</style>
</head>
<body>
<h1>🏏 Admin Panel</h1>
<p>Upload a scorecard screenshot to update points</p>

<label>Admin Key</label>
<input type="password" id="admin-key" placeholder="Enter admin key">

<label>Match Name</label>
<input type="text" id="match-name" placeholder="e.g. CSK vs MI">

<label>Scorecard Screenshot</label>
<div class="upload-area" id="upload-area" onclick="document.getElementById('image-input').click()">
  <p>Tap to select image or drag & drop</p>
  <img id="preview" class="preview">
</div>
<input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">

<div style="color:#6b6b8a;font-size:12px;margin-bottom:16px">Upload both innings scorecards separately for the same match name</div>

<button class="btn" id="upload-btn" onclick="uploadScorecard()">Process Scorecard</button>

<div class="spinner" id="spinner">⏳ Reading scorecard with AI... this takes ~15 seconds</div>
<div class="result" id="result"></div>

<script>
const uploadArea = document.getElementById('upload-area');
let selectedFile = null;

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  const preview = document.getElementById('preview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.querySelector('.upload-area p').textContent = file.name;
}

async function uploadScorecard() {
  const key = document.getElementById('admin-key').value.trim();
  const matchName = document.getElementById('match-name').value.trim();
  const resultEl = document.getElementById('result');
  const spinner = document.getElementById('spinner');
  const btn = document.getElementById('upload-btn');

  if (!key) { alert('Enter admin key'); return; }
  if (!matchName) { alert('Enter match name'); return; }
  if (!selectedFile) { alert('Select a scorecard image'); return; }

  btn.disabled = true;
  spinner.style.display = 'block';
  resultEl.style.display = 'none';

  const formData = new FormData();
  formData.append('image', selectedFile);
  formData.append('match_name', matchName);

  try {
    const res = await fetch('/api/upload-scorecard', {
      method: 'POST',
      headers: { 'X-Admin-Key': key },
      body: formData
    });
    const data = await res.json();

    spinner.style.display = 'none';
    btn.disabled = false;
    resultEl.style.display = 'block';

    if (data.success) {
      resultEl.className = 'result success';
      resultEl.innerHTML = `<h3>✅ ${data.match} — ${data.players_processed} players processed</h3>
        ${data.entries.map(e => `
          <div class="player-row">
            <span>${e.player} <small style="color:#6b6b8a">${e.runs}r ${e.wickets}w</small></span>
            <span class="${e.pts >= 0 ? 'pts-pos' : 'pts-neg'}">${e.pts > 0 ? '+' : ''}${e.pts} pts</span>
          </div>`).join('')}`;
    } else {
      resultEl.className = 'result error';
      resultEl.innerHTML = `<h3>❌ Error</h3><p>${data.error}</p>`;
    }
  } catch (err) {
    spinner.style.display = 'none';
    btn.disabled = false;
    resultEl.style.display = 'block';
    resultEl.className = 'result error';
    resultEl.innerHTML = `<h3>❌ Connection error</h3><p>${err.message}</p>`;
  }
}
</script>
</body>
</html>
